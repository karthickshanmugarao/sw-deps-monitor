name: CI Checks

on:
  pull_request:
    # Only listen for label changes on PRs
    types: [labeled]

permissions:
  contents: read

jobs:
  naming:
    # Only run when the added label is exactly 'RunCI'
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files for PR
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $pr = $env:PR_NUMBER
          $repo = $env:GITHUB_REPOSITORY
          $parts = $repo -split '/' 
          $owner = $parts[0]
          $name = $parts[1]
          $token = $env:GITHUB_TOKEN
          $api = "https://api.github.com/repos/$owner/$name/pulls/$pr/files?per_page=100"
          Write-Host "Querying changed files for PR #$pr"
          $resp = Invoke-RestMethod -Headers @{ Authorization = "token $token"; Accept = "application/vnd.github.v3+json" } -Uri $api -Method Get
          $files = @()
          $resp | ForEach-Object { $files += $_.filename }
          if ($files.Count -eq 0) { Write-Host 'No changed files found.' }
          $files | Out-File -FilePath changed-files.txt -Encoding utf8
          Get-Content changed-files.txt | ForEach-Object { Write-Host " - $_" }

      - name: Validate file and folder names (PascalCase)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\validate-paths.ps1 -PathsFile .\changed-files.txt

  sample_check:
    name: Sample Check
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]
    needs: naming

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

