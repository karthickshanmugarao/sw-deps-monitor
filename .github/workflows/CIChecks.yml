name: CI Checks

on:
  pull_request:
    # Only listen for label changes on PRs
    types: [labeled]

permissions:
  contents: read

jobs:
  naming:
    # Only run when the added label is exactly 'RunCI'
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files for PR
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          g-cli -v --lv-ver 2023 --arch 32 "${{ github.workspace }}\CICD\Reusables\GenerateChangedFilesList.vi" -- "${{github.workspace}}" "main" "initial-ci-check-yml" "${{ github.workspace }}\changed-files.txt"


      - name: Run path validator (Python)
        shell: powershell
        run: |
          cd ${{ github.workspace }}\scripts
          uv sync
          cd ${{ github.workspace }}\
          python -u .\scripts\src\scripts\validate_paths.py --paths-file .\changed-files.txt

  sample_check:
    name: Sample Check
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]
    needs: naming

    steps:
