name: CI Checks

on:
  pull_request:
    # Only listen for label changes on PRs
    types: [labeled]

permissions:
  contents: read

jobs:
  naming:
    # Only run when the added label is exactly 'RunCI'
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files for PR
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          Write-Host "Base: $env:PR_BASE  Head: $env:PR_HEAD"
          # Ensure both branches are available locally
          git fetch origin $env:PR_BASE $env:PR_HEAD --no-tags --no-recurse-submodules --depth=1
          # List files changed between base and head (uses the merge base)
          git diff --name-only origin/$env:PR_BASE...origin/$env:PR_HEAD | Out-File -FilePath changed-files.txt -Encoding utf8
          if ((Get-Item changed-files.txt).Length -eq 0) { Write-Host 'No changed files found.' }
          Get-Content changed-files.txt | ForEach-Object { Write-Host " - $_" }


      - name: Run path validator (Python)
        shell: powershell
        run: |
          cd ${{ github.workspace }}\scripts
          uv sync
          cd ${{ github.workspace }}\
          python .\scripts\src\scripts\validate_paths.py --paths-file .\changed-files.txt

  sample_check:
    name: Sample Check
    if: ${{ github.event.label.name == 'RunCI' }}
    runs-on: [self-hosted, Windows]
    needs: naming

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

