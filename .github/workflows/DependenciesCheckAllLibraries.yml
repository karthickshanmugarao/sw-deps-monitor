name: Dependencies Check For All Libraries

on:
  # schedule:
    # Runs at 18:30 UTC (12:00 AM IST) every day
    #        ┌───────────── minute (0 - 59)
    #        │   ┌───────────── hour (0 - 23)
    #        │   │ ┌───────────── day of the month (1 - 31)
    #        │   │ │ ┌───────────── month (1 - 12)
    #        │   │ │ │ ┌───────────── day of the week (0 - 6, Sunday = 0 or 7, or use names like MON, TUE)
    #        │   │ │ │ │
    #        *   * * * * <command or workflow trigger>
    # - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  DependenciesCheckAllLibraries:
    runs-on: [ci-pc]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unexpected Dependencies Check
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # False argument in the gcli command args represents Checking All Libraries
        run: |
          g-cli -v --lv-ver 2023 --arch 32 "${{github.workspace}}\CICD\AutomatedChecks\UnexpectedDepsCheck.vi" -- "${{github.workspace}}" "False"

      - name: Update Actual Deps List and Circular Dependencies Check
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Update the Actual Deps list for all libraries and then perform circular dependencies check.
        # False argument in the gcli command args represents Update for All Libraries
        run: |
          g-cli -v --lv-ver 2023 --arch 32 "${{github.workspace}}\CICD\AutomatedChecks\UpdateActualDepsList.vi" -- "${{github.workspace}}" "False"
          cd ${{ github.workspace }}\scripts
          uv sync
          cd ${{ github.workspace }}
          scripts\.venv\Scripts\activate
          uv run python -u ${{github.workspace}}\scripts\src\scripts\sort_actual_deps_list.py "${{ github.workspace }}\Source\ActualDependencies"
          uv run python -u ${{github.workspace}}\scripts\src\scripts\find_circular_paths.py --folder "${{ github.workspace }}\Source\ActualDependencies"

      - name: Create PR for ActualDepsList.adeps dependency updates if needed
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.DEPS_MON_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd ${{ github.workspace }}\scripts
          uv sync
          cd ${{ github.workspace }}
          scripts\.venv\Scripts\activate
          uv run python -u ${{github.workspace}}\scripts\src\scripts\create_pr_for_deps.py --workspace "${{ github.workspace }}" --deps-file-path "Source\ActualDependencies\ActualDepsList.adeps" --base-branch "${{ github.ref_name }}"
