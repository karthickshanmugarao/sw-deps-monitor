; PathConfigs.ini
; Configure which repository paths the CI naming checks should include or exclude.
; Paths are repository-relative (no drive). Use commas to separate multiple entries.
; Examples:
;   Include=Source,Tests
;   Exclude=ThirdParty,Docs

[GlobalIncludePaths]
Source = ""
Prototypes = ""


[GlobalExcludePaths]
Docs = ""
Tests = ""
scripts = ""
